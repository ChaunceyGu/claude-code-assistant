name: Build Claude Code Assistant

on:
  push:
    branches: [ main, master, feature/claude-assistant ]
  pull_request:
    branches: [ main, master, feature/claude-assistant ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Tauri CLI v1
      run: cargo install tauri-cli --version "^1.0" --locked

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      working-directory: ./src-ui
      run: npm install

    - name: Build frontend
      working-directory: ./src-ui
      run: npm run build

    - name: Build Tauri Application
      run: cargo tauri build
      env:
        TAURI_SIGNING_PRIVATE_KEY: ''
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: Claude-Code-Assistant-Windows
        path: |
          target/release/Claude Code Assistant.exe
          target/release/bundle/msi/*.msi
        if-no-files-found: warn

    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/release/Claude Code Assistant.exe
          target/release/bundle/msi/*.msi
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
